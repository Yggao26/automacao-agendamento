services:
  - type: web
    name: barber-bot-api
    env: node
    rootDir: pacote-dowload
    plan: starter
    autoDeploy: true
    buildCommand: cd "Automação" && npm install && npm run build
    preDeployCommand: cd "Automação" && npm run db:deploy
    startCommand: cd "Automação" && npm run start:prod
    healthCheckPath: /health
    disk:
      name: barber-bot-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        value: file:/var/data/dev.db
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_PHONE_NUMBER_ID
        sync: false
