services:
  - type: web
    name: barber-bot-api
    env: node
    rootDir: pacote-dowload/Automação
    plan: free
    autoDeploy: true
    buildCommand: npm install && npm run build && npm run db:deploy
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        value: file:./prisma/dev.db
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_PHONE_NUMBER_ID
        sync: false
